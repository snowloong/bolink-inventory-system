version: '3.8'

services:
  # PostgreSQL数据库
  postgres:
    image: postgres:15-alpine
    container_name: bolink_postgres
    environment:
      POSTGRES_DB: bolink_inventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bolink_network

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: bolink_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - bolink_network

  # 后端应用
  backend:
    build: .
    container_name: bolink_backend
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: password
      DB_DATABASE: bolink_inventory
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: your-super-secret-jwt-key
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    networks:
      - bolink_network
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:

networks:
  bolink_network:
    driver: bridge 